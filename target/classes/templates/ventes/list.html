<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 Commerce en Ligne</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/produits">📦 Produits</a>
            <a class="nav-link" href="/achats">🛍️ Achats</a>
            <a class="nav-link" href="/ventes">💰 Ventes</a>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>💰 Liste des Ventes</h2>
            <a href="/ventes/new" class="btn btn-primary">+ Ajouter</a>
        </div>
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Produit</th>
                <th>Quantité</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="vente : ${ventes}">
                <td th:text="${vente.id}"></td>
                <td th:text="${vente.dateP}"></td>
                <td th:text="${vente.product.name}"></td>
                <td th:text="${vente.quantity}"></td>
                <td>
                    <a th:href="@{/ventes/delete/{id}(id=${vente.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Supprimer cette vente ?')">🗑️</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
