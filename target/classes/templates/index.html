<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Commerce en Ligne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
        .card:hover { transform: scale(1.05); transition: 0.3s; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 Commerce en Ligne</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/produits">📦 Produits</a>
            <a class="nav-link" href="/achats">🛍️ Achats</a>
            <a class="nav-link" href="/ventes">💰 Ventes</a>
        </div>
    </div>
</nav>
<div class="container text-center mt-5">
    <h1 class="mb-4">🛒 Bienvenue sur Commerce en Ligne</h1>
    <p class="text-muted mb-5">Gérez vos produits, achats et ventes facilement</p>
    <div class="row justify-content-center g-4">
        <div class="col-md-3">
            <a href="/produits" class="text-decoration-none">
                <div class="card p-4 text-center">
                    <h1>📦</h1>
                    <h4>Produits</h4>
                    <p class="text-muted">Gérer le stock</p>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/achats" class="text-decoration-none">
                <div class="card p-4 text-center">
                    <h1>🛍️</h1>
                    <h4>Achats</h4>
                    <p class="text-muted">Enregistrer les achats</p>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/ventes" class="text-decoration-none">
                <div class="card p-4 text-center">
                    <h1>💰</h1>
                    <h4>Ventes</h4>
                    <p class="text-muted">Enregistrer les ventes</p>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
