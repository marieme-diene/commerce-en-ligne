<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 Commerce en Ligne</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/produits">📦 Produits</a>
            <a class="nav-link" href="/achats">🛍️ Achats</a>
            <a class="nav-link" href="/ventes">💰 Ventes</a>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card p-4" style="max-width: 500px; margin: auto;">
        <h2>Ajouter une Vente</h2>
        <form action="/ventes/save" method="post">
            <div class="mb-3">
                <label class="form-label">Produit</label>
                <select class="form-select" name="productId" required>
                    <option value="">-- Choisir un produit --</option>
                    <option th:each="p : ${produits}"
                            th:value="${p.id}"
                            th:text="${p.name} + ' (stock: ' + ${p.stock} + ')'">
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Quantité</label>
                <input type="number" class="form-control" name="quantity" min="1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" name="dateP" required>
            </div>
            <button type="submit" class="btn btn-success w-100">💾 Enregistrer</button>
            <a href="/ventes" class="btn btn-secondary w-100 mt-2">Annuler</a>
        </form>
    </div>
</div>
</body>
</html>
