<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { color: #3498db !important; }
        .card { border-radius: 12px; border: 0.5px solid #e0e0e0; }
        .stat-card { background-color: #f1f3f5; border: none; border-radius: 8px; padding: 1rem; }
        .progress { height: 8px; border-radius: 4px; }
        .badge-achat { background-color: #EAF3DE; color: #3B6D11; font-size: 12px; padding: 3px 10px; border-radius: 4px; }
        .badge-vente { background-color: #FCEBEB; color: #A32D2D; font-size: 12px; padding: 3px 10px; border-radius: 4px; }
        .alerte-rouge { background-color: #FCEBEB; border-radius: 8px; padding: 10px 12px; }
        .alerte-orange { background-color: #FAEEDA; border-radius: 8px; padding: 10px 12px; }
        .alerte-verte { background-color: #EAF3DE; border-radius: 8px; padding: 10px 12px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 Commerce en Ligne</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">🏠 Tableau de bord</a>
            <a class="nav-link" href="/produits">📦 Produits</a>
            <a class="nav-link" href="/achats">🛍️ Achats</a>
            <a class="nav-link" href="/ventes">💰 Ventes</a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Cartes statistiques -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <p class="text-muted mb-1" style="font-size:13px;">Total Produits</p>
                <h3 class="fw-500 mb-0" th:text="${totalProduits}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <p class="text-muted mb-1" style="font-size:13px;">Total Achats</p>
                <h3 class="fw-500 mb-0" th:text="${totalAchats}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <p class="text-muted mb-1" style="font-size:13px;">Total Ventes</p>
                <h3 class="fw-500 mb-0" th:text="${totalVentes}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <p class="text-muted mb-1" style="font-size:13px;">Stock Total</p>
                <h3 class="fw-500 mb-0" th:text="${stockTotal}">0</h3>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">

        <!-- Stock par produit -->
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">📊 Stock par produit</h5>
                <div th:each="produit : ${produits}" class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span style="font-size:13px;" th:text="${produit.name}"></span>
                        <span style="font-size:13px; font-weight:500;" th:text="${produit.stock}"></span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar"
                             th:classappend="${produit.stock < 20} ? 'bg-danger' : (${produit.stock < 50} ? 'bg-warning' : 'bg-success')"
                             role="progressbar"
                             th:style="'width: ' + ${produit.stock} + '%'"
                             style="max-width: 100%;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alertes stock -->
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="mb-3">⚠️ Alertes stock</h5>
                <div class="d-flex flex-column gap-2">
                    <div th:each="produit : ${produits}">
                        <div th:if="${produit.stock < 20}" class="alerte-rouge">
                            <p style="font-size:13px; font-weight:500; color:#A32D2D; margin:0;" th:text="${produit.name}"></p>
                            <p style="font-size:12px; color:#791F1F; margin:0;">Stock critique : <span th:text="${produit.stock}"></span></p>
                        </div>
                        <div th:if="${produit.stock >= 20 and produit.stock < 50}" class="alerte-orange">
                            <p style="font-size:13px; font-weight:500; color:#854F0B; margin:0;" th:text="${produit.name}"></p>
                            <p style="font-size:12px; color:#633806; margin:0;">Stock bas : <span th:text="${produit.stock}"></span></p>
                        </div>
                        <div th:if="${produit.stock >= 50}" class="alerte-verte">
                            <p style="font-size:13px; font-weight:500; color:#3B6D11; margin:0;" th:text="${produit.name}"></p>
                            <p style="font-size:12px; color:#27500A; margin:0;">Stock OK : <span th:text="${produit.stock}"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dernières transactions -->
    <div class="card p-4 mb-4">
        <h5 class="mb-3">🔄 Dernières transactions</h5>
        <table class="table table-hover" style="font-size:13px;">
            <thead style="border-bottom: 0.5px solid #e0e0e0;">
            <tr>
                <th class="text-muted fw-500">Type</th>
                <th class="text-muted fw-500">Produit</th>
                <th class="text-muted fw-500">Quantité</th>
                <th class="text-muted fw-500">Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="achat : ${derniersAchats}">
                <td><span class="badge-achat">Achat</span></td>
                <td th:text="${achat.product.name}"></td>
                <td th:text="${achat.quantity}"></td>
                <td th:text="${achat.dateP}"></td>
            </tr>
            <tr th:each="vente : ${dernieresVentes}">
                <td><span class="badge-vente">Vente</span></td>
                <td th:text="${vente.product.name}"></td>
                <td th:text="${vente.quantity}"></td>
                <td th:text="${vente.dateP}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
